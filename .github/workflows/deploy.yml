name: Deploy Jaaf Framework to VPS

on:
  push:
    branches:
      - main # main branch la push panna ithu run aagum

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploying via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /home/claw/jaaf-framework
            git pull origin main
            
            # Update Python dependencies
            pip3 install -r requirements.txt --break-system-packages
            
            # Restart using pm2 (PM2 is great for background process)
            npx -y pm2 restart jaaf-bot || npx -y pm2 start main.py --name "jaaf-bot" --interpreter python3
